<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="form.css" />   
</head>

<body>
    <div class="container">
        <div class="d-flex flex-row justify-content-center">
            <h1 class="headingUser">Add User</h1>
        </div>
        <form id="addUserForm">
            <div>
                <label class="headings" for="name">Name</label><br />
                <input type="text" id="name" />
                <p id="nameErrMsg" class="errmsg"></p>
            </div>
            <div>
                <label class="headings" for="email">Email</label><br />
                <input type="text" id="email" />
                <p id="emailErrMsg" class="errmsg"></p>
            </div>
            <div>
                <label class="headings" for="status">WorkingStatus</label>
                <br />
                <select class="selectItem" id="status">
                    <option value="active" selected>Active</option>
                    <option value="inactive">InActive</option>
                </select>
            </div>
            <h1 class=" mt-3 headings">Gender</h1>
            <div>
                <label for="genderMale">Male</label>
                <input type="radio" name="gender" id="genderMale" value="male" checked/>
            </div>
            <div>
                <label for="genderFemale">FeMale</label>
                <input type="radio" name="gender" id="genderFemale" value="female" />
            </div>
            <div class="d-flex flex-row justify-content-center">
                <button class="btn-primary" id="submitbtn" type="submit">submit</button>
            </div>
        </form>
        <h1 class="link" id="linkID"></h1>

    </div>
    <script src="form.js"></script>
</body>

</html>
